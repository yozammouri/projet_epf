services:
  backend:
    build: .
    volumes:
      - ./backend:/backend
    working_dir: /backend
    ports:
      - 80:80
    depends_on:
      - frontend
      - database

  frontend:
    image: node:18
    working_dir: /frontend
    volumes:
      - ./frontend:/frontend
    ports:
      - 3000:3000
    command: sh -c "npm install && npm run dev"

  # Database service (MySQL)
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: projet_epf
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql  # Persist data in a volume (important for development)

  # Adminer service (Database management UI)
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"  # Access Adminer at http://localhost:8080
    depends_on:
      - database

volumes:
  db_data:  # This volume will store the database data and keep it persistent across container restarts